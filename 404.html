<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>404 | مسار التقنية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1020;--bg2:#121a31;--text:#f7f9ff;--muted:#9ca9c7;--primary:#8b5cf6;--secondary:#22d3ee}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,var(--bg),var(--bg2));color:var(--text);font-family:Cairo,sans-serif;text-align:center;padding:24px}
h1{font-size:6rem;margin:0;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);font-size:1.1rem;margin:10px 0 24px}
a{display:inline-block;padding:12px 26px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div>
<h1>404</h1>
<p>هذه الصفحة غير موجودة. / This page does not exist.</p>
<a href="/">العودة للرئيسية · Back home</a>
</div>
</body>
</html>
